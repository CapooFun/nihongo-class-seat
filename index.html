<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初级1A - 班级日程表</title>
  <meta
    name="description"
    content="東京ノア日本語学校 初級1Aクラス ─ 班级日程・先生・クラスメート座席表"
  >
  <!-- Open Graph for WeChat / SNS sharing -->
  <meta property="og:title" content="初级1A - 班级日程表">
  <meta property="og:description" content="東京ノア日語学校 初级1A ─ 本周课程・老师・同学座位表">
  <meta property="og:image" content="https://capoofun.github.io/nihongo-class-seat/img/og-share.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
  </div>
  <div class="app-shell">
    <header class="page-header">
      <div class="hero-card card fade-in-up">
        <div class="hero-orb hero-orb-a" aria-hidden="true"></div>
        <div class="hero-orb hero-orb-b" aria-hidden="true"></div>
        <div class="hero-topline">
          <span class="glass-chip">東京ノア日本語学校</span>
          <span class="glass-chip glass-chip-soft">初級1Aクラス</span>
        </div>
        <p class="eyebrow">TODAY'S OVERVIEW</p>
        <h1>スケジュール＆クラスメート</h1>
        <p class="hero-description">授業・先生・クラスメートをすぐ確認。</p>

        <div class="calendar-widget" id="calendar-widget" aria-live="polite">
          <div class="cal-header">
            <button class="cal-nav cal-nav-month" id="cal-prev" type="button" aria-label="前月">‹</button>
            <button class="cal-title-btn" id="cal-toggle" type="button">
              <span class="cal-title" id="cal-title"></span>
              <span class="cal-toggle-icon" id="cal-toggle-icon"></span>
            </button>
            <button class="cal-nav cal-nav-month" id="cal-next" type="button" aria-label="次月">›</button>
          </div>
          <div class="cal-weekdays">
            <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="cal-weekend">土</span><span class="cal-weekend">日</span>
          </div>
          <div class="cal-grid-wrap" id="cal-grid-wrap">
            <div class="cal-grid" id="cal-grid"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="page-main">
      <section class="card section-card activity-panel fade-in-up" aria-labelledby="activity-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">CLASS ACTIVITIES</p>
            <h2 id="activity-title">クラス活動</h2>
          </div>
        </div>
        <div id="activity-list" class="activity-list"></div>
      </section>

      <section class="card section-card schedule-panel fade-in-up" aria-labelledby="schedule-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">WEEKLY SCHEDULE</p>
            <h2 id="schedule-title">今週の時間割 <span id="week-label" class="schedule-week-range"></span></h2>
          </div>
        </div>
        <div class="schedule-scroll">
          <div id="schedule-grid" class="schedule-grid" aria-live="polite"></div>
        </div>
      </section>

      <section class="card section-card seat-panel fade-in-up" aria-labelledby="seatmap-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">CLASSMATES</p>
            <h2 id="seatmap-title">クラスメート＆座席表</h2>
          </div>
          <p class="section-meta">拖动换座（保存在本机浏览器）· タップで詳細</p>
        </div>

        <div class="seat-stage">
          <div class="board-sign">黒板 / 教卓</div>
        </div>

        <div class="seat-scroll">
          <div id="seat-grid" class="seat-grid" aria-label="クラス座席表"></div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Capoo が作成</p>
    </footer>
  </div>

  <div id="modal-root"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/activity-list.js"></script>
</body>
</html>
